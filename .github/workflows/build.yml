name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: RESUMESAFE-windows
            dist_path: dist/RESUMESAFE.exe

          - os: macos-latest
            artifact: RESUMESAFE-macos
            dist_path: dist/RESUMESAFE-macos.zip

          - os: ubuntu-22.04
            artifact: RESUMESAFE-linux
            dist_path: dist/RESUMESAFE

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build — Windows
        if: runner.os == 'Windows'
        run: flet pack main.py --name RESUMESAFE --icon assets/icon.ico

      - name: Build — macOS / Linux
        if: runner.os != 'Windows'
        run: flet pack main.py --name RESUMESAFE

      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        run: cd dist && zip -r RESUMESAFE-macos.zip RESUMESAFE.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}

  # ── Release（仅在推送 tag 时执行）─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
